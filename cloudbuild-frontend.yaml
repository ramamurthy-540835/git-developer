steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/git-developer-frontend:$SHORT_SHA
      - -t
      - gcr.io/$PROJECT_ID/git-developer-frontend:latest
      - ./frontend
    id: build-frontend

  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - gcr.io/$PROJECT_ID/git-developer-frontend:$SHORT_SHA
    id: push-sha
    waitFor: [build-frontend]

  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - gcr.io/$PROJECT_ID/git-developer-frontend:latest
    id: push-latest
    waitFor: [build-frontend]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - git-developer-frontend
      - --image=gcr.io/$PROJECT_ID/git-developer-frontend:$SHORT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
    waitFor: [push-sha]

images:
  - gcr.io/$PROJECT_ID/git-developer-frontend:$SHORT_SHA
  - gcr.io/$PROJECT_ID/git-developer-frontend:latest

options:
  logging: CLOUD_LOGGING_ONLY
