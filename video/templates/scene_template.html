<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <style>
    html, body { margin:0; width:1920px; height:1080px; overflow:hidden; font-family: Segoe UI, Arial, sans-serif; background:#101820; color:#ECF3FF; }
    #root { width:1920px; height:1080px; display:flex; flex-direction:column; }
    #header { height:120px; display:flex; justify-content:space-between; align-items:flex-start; padding:18px 32px; background:#1F2A3A; }
    #titleWrap {display:flex; flex-direction:column; max-width:1300px;}
    #title {font-size:40px; font-weight:700; line-height:1.1;}
    #subtitle {font-size:24px; opacity:.9; margin-top:6px;}
    #diagram-wrap { height:760px; display:flex; align-items:center; justify-content:center; padding:10px 20px; }
    #diagram { width:90%; height:90%; }
    #caption-wrap { height:170px; display:flex; align-items:flex-start; justify-content:center; padding-top:18px; }
    #caption { font-size:34px; line-height:1.2; white-space:normal; overflow:hidden; max-width:1700px; background:rgba(0,0,0,0.5); padding:12px 20px; border-radius:12px; text-align:center; }
    #safe { height:108px; }
    .node.pending { opacity: 0.35; }
    .node.done rect, .node.done polygon, .node.done path { fill: #1D9E75 !important; stroke: #1D9E75 !important; }
    .node.active rect, .node.active polygon, .node.active path { fill: #534AB7 !important; stroke: #8EC5FF !important; stroke-width: 2px !important; }
    .node.active { animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 50% { transform: scale(1.04); } }
  </style>
</head>
<body>
  <div id="root">
    <div id="header"><div id="titleWrap"><div id="product"></div><div id="title"></div><div id="subtitle"></div></div><div id="sceneCounter"></div></div>
    <div id="diagram-wrap"><div id="diagram"></div></div>
    <div id="caption-wrap"><div id="caption"></div></div>
    <div id="safe"></div>
  </div>
  <script>
    mermaid.initialize({ startOnLoad: false, securityLevel: 'loose' });
    window.renderScene = async (payload) => {
      document.getElementById('product').textContent = payload.product;
      document.getElementById('title').textContent = payload.title || '';
      document.getElementById('subtitle').textContent = payload.subtitle || '';
      document.getElementById('sceneCounter').textContent = `Scene ${payload.sceneIndex + 1} / ${payload.totalScenes}`;
      document.getElementById('caption').textContent = payload.caption || '';
      const container = document.getElementById('diagram');
      try {
        const graph = (payload.mermaid_graph || '').trim();
        if (!graph || graph.includes('-->') && graph.split('\n').length === 1) {
          container.innerHTML = '';
          document.getElementById('diagram-wrap').style.display = 'none';
        } else {
          const { svg } = await mermaid.render(`m${Date.now()}`, graph);
          container.innerHTML = svg;
          document.getElementById('diagram-wrap').style.display = 'flex';
        }
      } catch (e) {
        container.innerHTML = '';
        document.getElementById('diagram-wrap').style.display = 'none';
      }
      const nodes = container.querySelectorAll('.node');
      nodes.forEach((n) => {
        const t = (n.textContent || '').trim();
        n.classList.remove('pending', 'done', 'active');
        if ((payload.done || []).includes(t)) n.classList.add('done');
        else if (payload.active === t) n.classList.add('active');
        else n.classList.add('pending');
      });
    };
  </script>
</body>
</html>
