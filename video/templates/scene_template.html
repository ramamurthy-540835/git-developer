<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <style>
    html, body { margin:0; width:1920px; height:1080px; overflow:hidden; font-family: Segoe UI, Arial, sans-serif; background:#101820; color:#ECF3FF; }
    #root { width:1920px; height:1080px; display:flex; flex-direction:column; }
    #main {height:760px; display:flex; gap:24px; padding:18px 28px 0 28px;}
    #left {flex:1; background:rgba(255,255,255,0.04); border-radius:14px; padding:22px;}
    #right {width:760px; background:rgba(255,255,255,0.04); border-radius:14px; padding:18px; display:flex; align-items:center; justify-content:center;}
    #bullets {margin-top:16px; font-size:34px; line-height:1.35;}
    #bullets li {margin-bottom:10px;}
    #header { height:120px; display:flex; justify-content:space-between; align-items:flex-start; padding:18px 32px; background:#1F2A3A; }
    #titleWrap {display:flex; flex-direction:column; max-width:1300px;}
    #title {font-size:40px; font-weight:700; line-height:1.1;}
    #subtitle {font-size:24px; opacity:.9; margin-top:6px;}
    #diagram-wrap { width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
    #diagram { width:100%; height:100%; }
    #diagramFallback {display:none; width:100%; height:100%; border:1px solid rgba(255,255,255,0.2); border-radius:12px; padding:20px;}
    #diagramFallback h4 {font-size:28px; margin:0 0 12px 0;}
    #diagramFallback li {font-size:26px; margin-bottom:8px;}
    #caption-wrap { height:200px; display:flex; align-items:flex-start; justify-content:center; padding-top:18px; padding-bottom:120px; box-sizing:border-box; }
    #caption { font-size:30px; line-height:1.25; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; max-width:1700px; background:rgba(0,0,0,0.62); padding:12px 20px; border-radius:12px; text-align:center; }
    #safe { height:108px; }
    .node.pending { opacity: 0.35; }
    .node.done rect, .node.done polygon, .node.done path { fill: #1D9E75 !important; stroke: #1D9E75 !important; }
    .node.active rect, .node.active polygon, .node.active path { fill: #534AB7 !important; stroke: #8EC5FF !important; stroke-width: 2px !important; }
    .node.active { animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 50% { transform: scale(1.04); } }
  </style>
</head>
<body>
  <div id="root">
    <div id="header"><div id="titleWrap"><div id="product"></div><div id="title"></div><div id="subtitle"></div></div><div id="sceneCounter"></div></div>
    <div id="main">
      <div id="left"><ul id="bullets"></ul></div>
      <div id="right"><div id="diagram-wrap"><div id="diagram"></div><div id="diagramFallback"><h4>Workflow diagram unavailable</h4><ul><li>Data flows through analytics pipeline</li><li>AI generates decision-ready outputs</li><li>Teams act on insights faster</li></ul></div></div></div>
    </div>
    <div id="caption-wrap"><div id="caption"></div></div>
    <div id="safe"></div>
  </div>
  <script>
    mermaid.initialize({ startOnLoad: false, securityLevel: 'loose' });
    window.renderScene = async (payload) => {
      document.getElementById('product').textContent = payload.product;
      document.getElementById('title').textContent = payload.title || '';
      document.getElementById('subtitle').textContent = payload.subtitle || '';

      const bulletsEl = document.getElementById('bullets');
      bulletsEl.innerHTML = '';
      const titleNorm = (payload.title || '').toLowerCase().trim();
      const subtitleNorm = (payload.subtitle || '').toLowerCase().trim();
      (payload.bullets || []).forEach((b) => {
        const t = (b || '').trim();
        const n = t.toLowerCase();
        if (!t) return;
        if (n === titleNorm || n === subtitleNorm) return;
        const li = document.createElement('li');
        li.textContent = t;
        bulletsEl.appendChild(li);
      });
      document.getElementById('sceneCounter').textContent = `Scene ${payload.sceneIndex + 1} / ${payload.totalScenes}`;
      document.getElementById('caption').textContent = payload.caption || '';
      const container = document.getElementById('diagram');
      const fb = document.getElementById('diagramFallback');
      try {
        const graph = (payload.mermaid_graph || '').trim();
        const rawLike = /\b[A-Z]\s*-->\s*[A-Z]\b/.test(graph);
        if (!graph || rawLike && graph.split('\n').length < 2) {
          container.innerHTML = '';
          container.style.display = 'none';
          fb.style.display = 'block';
        } else {
          const { svg } = await mermaid.render(`m${Date.now()}`, graph);
          container.innerHTML = svg;
          container.style.display = 'block';
          fb.style.display = 'none';
        }
      } catch (e) {
        container.innerHTML = '';
        container.style.display = 'none';
        fb.style.display = 'block';
      }
      // validation guards
      const cap = document.getElementById('caption');
      const capRect = cap.getBoundingClientRect();
      if ((1080 - capRect.bottom) < 120) { cap.style.fontSize = '26px'; }
      const nodes = container.querySelectorAll('.node');
      nodes.forEach((n) => {
        const t = (n.textContent || '').trim();
        n.classList.remove('pending', 'done', 'active');
        if ((payload.done || []).includes(t)) n.classList.add('done');
        else if (payload.active === t) n.classList.add('active');
        else n.classList.add('pending');
      });
    };
  </script>
</body>
</html>
